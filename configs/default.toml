[mode]
strict = true
debug = false
search_profile = "strict_canon_guarded"

[search]
until_step = 8
workers = "auto"
max_workers = 8
frontier_mode = "obligation_guided"
learned_motifs = false

[objective]
exact_clause_policy = "strict"
window_depth = 2
selector = "minimal_positive_overshoot"

[memory]
reserve_for_os_gib = 2.0
target_rss_gib = 6.0
soft_rss_gib = 6.5
pressure_rss_gib = 7.5
emergency_rss_gib = 8.0
hard_rss_gib = 8.5
hot_frontier_gib = 1.50
intern_gib = 1.50
dedupe_gib = 0.75
cache_gib = 0.50
spill_buffers_gib = 0.25
checkpoint_buffers_gib = 0.25
worker_arena_mib = 64

[checkpoint]
root = "runs"
step_on_accept = true
frontier_interval_sec = 180
retain_frontier_generations = 3
compression = "zstd"

[accel]
backend = "auto"
verify_on_cpu = true
