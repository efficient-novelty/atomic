[mode]
strict = true
debug = false
search_profile = "desktop_claim_shadow"

[search]
until_step = 6
workers = 1
max_workers = 1
frontier_mode = "obligation_guided"
learned_motifs = false

[objective]
exact_clause_policy = "strict"
window_depth = 2
selector = "minimal_positive_overshoot"

[memory]
reserve_for_os_gib = 4.0
target_rss_gib = 8.5
soft_rss_gib = 9.0
pressure_rss_gib = 10.5
emergency_rss_gib = 11.5
hard_rss_gib = 12.0
hot_frontier_gib = 2.25
intern_gib = 2.0
dedupe_gib = 1.25
cache_gib = 0.75
spill_buffers_gib = 0.50
checkpoint_buffers_gib = 0.25
worker_arena_mib = 64

[checkpoint]
root = "runs"
step_on_accept = true
frontier_interval_sec = 180
retain_frontier_generations = 3
compression = "zstd"

[accel]
backend = "auto"
verify_on_cpu = true

# This claim-lane milestone keeps desktop_claim_shadow comparison-backed while
# using claim-debt admissibility, claim-generic late mutators, and
# structural-generic claim bucket scheduling. Stored breadth evidence and
# certification still remain to land.
# The shared [demo] block still carries narrative and floor metadata for the
# claim lane until the reporting surface is renamed.
[demo]
enabled = true
profile = "claim-smoke"
total_budget_sec = 120
early_exhaustive_budget_sec = 30
adaptive_reserve_sec = 30
proof_close_reserve_fraction = "0.30"
scout_fraction = "0.10"

[demo.narrative]
live_console = true
min_lines_per_step = 20
max_lines_per_step = 120
pulse_interval_millis = 500
persist_step_events = true
show_progress_bar = true

